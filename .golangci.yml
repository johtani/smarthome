version: "2"
run:
  tests: true
linters:
  enable:
    - gocritic
    - gosec
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: package-comments
        - name: exported
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - gosec
        text: 'G404: Use of weak random number generator'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
